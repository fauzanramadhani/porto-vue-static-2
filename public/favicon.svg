<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@800&amp;display=swap');
      text {
        font-family: 'Outfit', 'Inter', system-ui, -apple-system, sans-serif;
        font-weight: 800;
        font-size: 19px;
        fill: #0F172A;
      }
      .dot {
        fill: #2563EB;
      }
      @media (prefers-color-scheme: dark) {
        text {
          fill: #F8FAFC;
        }
        .dot {
          fill: #3B82F6;
        }
      }
    </style>
  </defs>
  <!-- Positioned to be centered vertically and horizontally -->
  <text x="16" y="23" text-anchor="middle" letter-spacing="-0.5px">FR<tspan class="dot">.</tspan></text>
</svg>
